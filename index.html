<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Load data first -->
    <script src="data.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .skill-badge {
            transition: all 0.3s ease;
        }

        .skill-badge:hover {
            transform: translateY(-3px);
            background-color: #e0e7ff;
            color: #4338ca;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-800">

    <!-- NAVBAR -->
    <nav class="fixed w-full z-50 bg-white/70 backdrop-blur-lg border-b border-slate-200">
        <div class="mx-auto px-6 py-4 flex justify-between items-center">
            <span id="nav-name" class="text-2xl font-extrabold tracking-tight text-indigo-600 italic"></span>

            <div class="hidden md:flex space-x-8 text-sm font-semibold">
                <a href="#about" class="hover:text-indigo-600">About</a>
                <a href="#skills" class="hover:text-indigo-600">Skills</a>
                <a href="#education" class="hover:text-indigo-600">Experience & Education</a>
                <a href="#projects" class="hover:text-indigo-600">Projects</a>
                <a href="#contact" class="hover:text-indigo-600">Contact</a>
            </div>
        </div>
    </nav>

    <!-- ABOUT -->
    <section id="about" class="pt-32 pb-20 px-6 mx-auto bg-indigo-50 border-b border-indigo-100">
        <div class="max-w-4xl mx-auto text-center bg-white/60 backdrop-blur-sm p-10 rounded-3xl shadow-sm border border-indigo-100">
            <h2 id="about-title" class="text-indigo-600 font-bold tracking-widest text-sm uppercase mb-4"></h2>
            <h1 id="about-name" class="text-6xl font-semibold text-slate-900 mb-6 leading-tight"></h1>
            <p id="about-summary" class="text-slate-600 text-lg leading-relaxed mb-8 mx-auto max-w-3xl"></p>

            <div id="contact-info-top" class="flex flex-wrap justify-center gap-6 text-sm"></div>

            <div class="mt-10 flex justify-center">
                <a id="resume-link" href="#" download class="inline-flex items-center gap-3 px-8 py-3 bg-indigo-600 text-white font-semibold text-sm rounded-full shadow-md hover:bg-indigo-700 hover:shadow-lg transition-all duration-300">
                    <i class="fas fa-download"></i>
                    Download Resume
                </a>
            </div>
        </div>
    </section>

    <!-- SKILLS -->
    <section id="skills" class="py-10 px-6 border-y border-slate-200">
        <div class="max-w-7xl mx-auto">
            <h3 class="text-3xl font-bold mb-12 flex items-center gap-4">
                Technical Arsenal
                <span class="h-1 w-24 bg-indigo-600 rounded"></span>
            </h3>
            <div id="skills-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8"></div>
        </div>
    </section>
    <!-- EDUCATION, EXPERIENCE & ACHIEVEMENTS -->
    <section id="education" class="py-20 px-6 bg-white border-t border-slate-200">
        <div class="max-w-7xl mx-auto grid md:grid-cols-2 gap-16">
            
            <!-- LEFT COLUMN: Education & Achievements -->
            <div class="space-y-16">
                <div>
                    <h3 class="text-2xl font-bold mb-8 flex items-center gap-3">
                        <i class="fas fa-graduation-cap text-indigo-600"></i>
                        Education
                    </h3>
                    <div id="education-list" class="space-y-6"></div>
                </div>

                <div>
                    <h3 class="text-2xl font-bold mb-8 flex items-center gap-3">
                        <i class="fas fa-award text-indigo-600"></i>
                        Achievements & Impact
                    </h3>
                    <div id="achievements-list" class="space-y-4"></div>
                </div>
            </div>

            <!-- RIGHT COLUMN: Experience -->
            <div>
                <h3 class="text-2xl font-bold mb-8 flex items-center gap-3">
                    <i class="fas fa-briefcase text-indigo-600"></i>
                    Professional Experience
                </h3>
                <div id="experience-list" class="relative border-l-2 border-indigo-500 pl-8 space-y-12"></div>
            </div>
        </div>
    </section>

    <!-- PROJECTS -->
    <section id="projects" class="py-10 px-6 max-w-7xl mx-auto">
        <div class="max-w-7xl mx-auto">
            <h3 class="text-3xl font-bold mb-12 flex items-center gap-4">
                Project Works
                <span class="h-1 w-24 bg-indigo-600 rounded"></span>
            </h3>
        </div>
        <div id="projects-list" class="space-y-32"></div>
    </section>


    <!-- CONTACT -->
    <section id="contact" class="py-10 px-6 bg-indigo-50 border-t border-indigo-100">
        <div class="max-w-4xl mx-auto text-center">
            <h3 class="text-3xl font-bold mb-10">Get In Touch</h3>
            <div id="contact-links" class="grid grid-cols-2 md:grid-cols-3 gap-4 text-sm"></div>
        </div>
    </section>

    <footer class="py-2 text-center text-slate-500 text-sm border-t border-slate-200">
        <p id="footer-text"></p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof portfolioData === 'undefined') {
                console.error('portfolioData is not loaded. Ensure data.js is correctly linked.');
                return;
            }

            // Update Title
            document.title = `${portfolioData.name} | Portfolio`;

            // Navbar
            document.getElementById('nav-name').textContent = portfolioData.name + '.';

            // About Section
            document.getElementById('about-title').textContent = portfolioData.title;
            document.getElementById('about-name').textContent = portfolioData.name + '.';
            document.getElementById('about-summary').textContent = portfolioData.summary;
            document.getElementById('resume-link').href = portfolioData.contact.resume;

            const topContact = document.getElementById('contact-info-top');
            topContact.innerHTML = `
                <div class="flex items-center gap-2"><i class="fas fa-phone text-indigo-500"></i> ${portfolioData.contact.phone}</div>
                <div class="flex items-center gap-2"><i class="fas fa-envelope text-indigo-500"></i> ${portfolioData.contact.email}</div>
                <a href="${portfolioData.contact.linkedin}" target="_blank" class="flex items-center gap-2 hover:text-indigo-600 transition">
                    <i class="fab fa-linkedin text-indigo-500"></i> LinkedIn
                </a>
                <a href="${portfolioData.contact.github}" target="_blank" class="flex items-center gap-2 hover:text-indigo-600 transition">
                    <i class="fab fa-github text-indigo-500"></i> GitHub
                </a>
                <a href="${portfolioData.contact.leetcode}" target="_blank" class="flex items-center gap-2 hover:text-indigo-600 transition">
                    <i class="fas fa-code text-indigo-500"></i> LeetCode
                </a>
            `;

            // Skills Section
            const skillGrid = document.getElementById('skills-grid');
            const skillIcons = {
                "Languages": "fa-code",
                "Backend Development": "fa-server",
                "Frontend Development": "fa-laptop-code",
                "AI & Data": "fa-brain",
                "Databases": "fa-database",
                "Tools & Platforms": "fa-tools"
            };

            Object.entries(portfolioData.skills).forEach(([group, list]) => {
                skillGrid.innerHTML += `
                    <div class="p-6">
                        <div class="flex items-center gap-3 mb-4 text-indigo-600">
                            <i class="fas ${skillIcons[group] || 'fa-star'} text-xl"></i>
                            <h4 class="font-bold">${group}</h4>
                        </div>
                        <div class="flex flex-wrap gap-2">
                            ${list.map(s => `<span class="skill-badge bg-white shadow-sm border border-slate-100 px-3 py-1 rounded-lg text-[10px] font-bold uppercase tracking-wider">${s}</span>`).join('')}
                        </div>
                    </div>
                `;
            });

            // Projects Section
            const projectList = document.getElementById('projects-list');
            portfolioData.projects.forEach(p => {
                const linkHtml = p.link ? `
                    <a href="${p.link}" target="_blank" class="mt-6 inline-flex items-center gap-2 text-indigo-600 font-bold hover:text-indigo-700 transition">
                        View Live Project <i class="fas fa-external-link-alt text-xs"></i>
                    </a>
                ` : '';

                const metricsHtml = p.metrics ? `
                    <div class="mt-6 flex flex-wrap gap-3">
                        ${Object.entries(p.metrics).map(([key, val]) => `
                            <div class="bg-indigo-50 border border-indigo-100 px-3 py-1 rounded-full">
                                <span class="text-[10px] font-bold text-indigo-600 uppercase tracking-tighter">${key.replace(/_/g, ' ')}:</span>
                                <span class="text-[10px] font-extrabold text-indigo-800 uppercase tracking-tighter">${val}</span>
                            </div>
                        `).join('')}
                    </div>
                ` : '';

                projectList.innerHTML += `
                    <div class="grid lg:grid-cols-2 gap-12 items-start">
                        <div class="aspect-video rounded-3xl border border-indigo-200 overflow-hidden shadow-xl group relative bg-slate-200 lg:sticky lg:top-24">
                            <!-- Blurred Backdrop -->
                            <img src="${p.image}" class="absolute inset-0 w-full h-full object-cover blur-2xl opacity-40 scale-110" aria-hidden="true">
                            <!-- Main Image -->
                            <img src="${p.image}" alt="${p.name}" class="relative w-full h-full object-contain group-hover:scale-105 transition-transform duration-500">
                        </div>
                        <div>
                            <div class="flex flex-wrap gap-2 mb-4">
                                ${p.tech_stack.map(tech => `<span class="text-[10px] font-bold text-indigo-500 bg-indigo-50 px-2 py-0.5 rounded uppercase">${tech}</span>`).join('')}
                            </div>
                            <h4 class="text-3xl font-bold text-slate-900 mb-4">${p.name}</h4>
                            <p class="text-slate-600 text-lg leading-relaxed mb-6 font-medium italic border-l-4 border-indigo-200 pl-4">${p.description}</p>
                            
                            <ul class="space-y-3 mb-6">
                                ${p.bullets.map(bullet => `
                                    <li class="flex items-start gap-3 text-slate-600 text-sm leading-relaxed">
                                        <i class="fas fa-check-circle text-indigo-500 mt-1 text-xs"></i>
                                        <span>${bullet}</span>
                                    </li>
                                `).join('')}
                            </ul>

                            ${metricsHtml}
                            ${linkHtml}
                        </div>
                    </div>
                `;
            });

            // Achievements Section
            const achList = document.getElementById('achievements-list');
            portfolioData.achievements.forEach(ach => {
                achList.innerHTML += `
                    <div class="glass-card p-4 rounded-xl transition hover:shadow-md border-l-4 ${ach.highlight ? 'border-indigo-500' : 'border-slate-200'}">
                        <div class="flex items-center gap-3 mb-2">
                            <i class="fas ${ach.highlight ? 'fa-award text-indigo-600' : 'fa-certificate text-slate-400'} text-sm"></i>
                            <h4 class="text-sm font-bold text-slate-900">${ach.title}</h4>
                        </div>
                        <p class="text-slate-500 text-xs leading-relaxed">${ach.description}</p>
                    </div>
                `;
            });

            // Education Section
            const eduList = document.getElementById('education-list');
            portfolioData.education.forEach(edu => {
                eduList.innerHTML += `
                    <div class="glass-card p-6 rounded-2xl shadow-sm">
                        <h4 class="font-bold text-lg text-slate-900">${edu.degree}</h4>
                        <p class="text-indigo-600 font-semibold mb-1">${edu.institution}</p>
                        <div class="flex justify-between items-center text-sm text-slate-500">
                            <span>${edu.duration}</span>
                            <span class="bg-indigo-50 px-2 py-0.5 rounded font-bold text-indigo-700">CGPA: ${edu.cgpa}</span>
                        </div>
                    </div>
                `;
            });

            // Experience Section
            const expList = document.getElementById('experience-list');
            portfolioData.experience.forEach(exp => {
                expList.innerHTML += `
                    <div class="relative">
                        <div class="absolute -left-10 top-1 w-4 h-4 bg-indigo-600 rounded-full border-4 border-white shadow-sm"></div>
                        <div class="flex flex-wrap justify-between items-start mb-4 gap-2">
                            <h4 class="font-bold text-xl text-slate-900">${exp.role}</h4>
                            <span class="text-xs font-bold text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full uppercase tracking-wider">${exp.duration}</span>
                        </div>
                        <p class="text-indigo-600 font-bold mb-4">${exp.company}</p>
                        <ul class="space-y-3">
                            ${exp.bullets.map(bullet => `
                                <li class="flex items-start gap-3 text-slate-600 text-sm leading-relaxed">
                                    <span class="mt-1.5 w-1.5 h-1.5 bg-indigo-400 rounded-full shrink-0"></span>
                                    <span>${bullet}</span>
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                `;
            });

            // Contact Section
            const contactLinks = document.getElementById('contact-links');
            const links = [
                { id: 'email', icon: 'fas fa-envelope', label: 'Email', href: `mailto:${portfolioData.contact.email}` },
                { id: 'phone', icon: 'fas fa-phone', label: 'Phone', href: `tel:${portfolioData.contact.phone.replace(/\s/g, '')}` },
                { id: 'linkedin', icon: 'fab fa-linkedin', label: 'LinkedIn', href: portfolioData.contact.linkedin }
            ];

            links.forEach(link => {
                contactLinks.innerHTML += `
                    <a href="${link.href}" target="_blank" class="glass-card p-4 rounded-xl flex flex-col items-center gap-2 hover:bg-indigo-50 transition group">
                        <i class="${link.icon} text-indigo-600 text-xl group-hover:scale-110 transition"></i>
                        <span class="font-bold text-[11px] uppercase tracking-wider text-slate-600">${link.label}</span>
                    </a>
                `;
            });

            // Footer
            document.getElementById('footer-text').innerHTML = `&copy; ${new Date().getFullYear()} ${portfolioData.name}.`;
        });
    </script>
</body>

</html>
